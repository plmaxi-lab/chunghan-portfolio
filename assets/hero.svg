<svg viewBox="0 0 640 508" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chung Han at his desk designing with AI while his cockapoo Cha Cha sleeps nearby, tail wagging">
<defs>
  <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="6" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <style>
    .tail { transform-box: fill-box; transform-origin: 12% 88%; animation: wag .42s ease-in-out infinite alternate; }
    @keyframes wag { from { transform: rotate(-17deg); } to { transform: rotate(15deg); } }
    .breathe { transform-box: fill-box; transform-origin: 50% 92%; animation: breathe 3.6s ease-in-out infinite alternate; }
    @keyframes breathe { from { transform: scale(1,1); } to { transform: scale(1.025,1.04); } }
    .tap { animation: tap .55s ease-in-out infinite alternate; }
    @keyframes tap { from { transform: translateY(0); } to { transform: translateY(2.6px); } }
    .spark { transform-box: fill-box; transform-origin: 50% 50%; animation: tw 1.9s ease-in-out infinite alternate; }
    .spark.s2 { animation-delay: .7s; } .spark.s3 { animation-delay: 1.2s; }
    @keyframes tw { from { transform: scale(.5); opacity: .35; } to { transform: scale(1.05); opacity: 1; } }
    .bulb { animation: glow 2.3s ease-in-out infinite alternate; }
    @keyframes glow { from { opacity: .25; } to { opacity: .9; } }
    .float { animation: fl 4.4s ease-in-out infinite alternate; }
    .float.f2 { animation-delay: 1.4s; } .float.f3 { animation-delay: 2.3s; }
    @keyframes fl { from { transform: translateY(4px); } to { transform: translateY(-6px); } }
    .zz { opacity: 0; animation: zf 2.9s ease-in-out infinite; }
    .zz.zb { animation-delay: 1s; } .zz.zc { animation-delay: 2s; }
    @keyframes zf { 0%{ transform: translate(0,0); opacity:0; } 18%{ opacity:.85; } 75%{ opacity:.4; } 100%{ transform: translate(-10px,-26px); opacity:0; } }
    @media (prefers-reduced-motion: reduce) {
      .tail,.breathe,.tap,.spark,.bulb,.float,.zz { animation: none; opacity: 1; }
    }
  </style>
</defs>

