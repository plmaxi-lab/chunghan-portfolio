<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg  { fill: #2A3B47; }
    .cut { fill: #FAF8F3; }
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #FAF8F3; }
      .cut { fill: #2A3B47; }
